<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digital Obeya — Action Plans Search</title>
<style>
  :root{
    --primary:#001391; --primary-hover:#001072;
    --text:#2a2a2a; --text-strong:#1c1c1c; --muted:#717182; --muted-2:#5a5f6b;
    --border:#f0f2f5; --input:#e4e7ea; --table-head:#F3F3F3; --zebra:#f8f9fb;
    --green:#14AE5C; --green-tint:#DCF5E6;
    --yellow:#A07D12; --yellow-tint:#FDF3D6;
    --red:#EC221F; --red-tint:#FDE7E7;
    --blue-tint:#F5F5FF; --gold:#E8B931;
  }
  *{ box-sizing:border-box }
  body{ margin:0; font-family:Inter,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--text); background:#fff; font-size:14px }
  .page{ padding:20px 24px 60px }
  .crumb{ font-size:13px; color:var(--muted-2); margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:12px }
  .crumb b{ color:var(--text-strong); font-weight:600 }

  /* Totalizers */
  .kc-tots{ position:relative; display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px }
  .tot-card{ flex:1; min-width:170px; background:#eef1fb; border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; border:2px solid transparent; transition:border-color .12s, background .12s }
  .tot-card.tot-click{ cursor:pointer } .tot-card.tot-click:hover{ background:#e4e9fa }
  .tot-card.tot-active{ border-color:var(--primary); background:#e4e9fa }
  .tot-card .tc-ico{ width:38px; height:38px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; flex:0 0 38px; border:1px solid transparent }
  .tot-card .tc-lbl{ font-size:12px; color:var(--muted-2) }
  .tot-card .tc-val{ font-size:20px; font-weight:700; color:var(--text-strong); line-height:1.15 }
  .tot-card.tot-big{ flex:1.35; background:#e3e8fb }
  .tot-card.tot-big .tc-ico{ width:46px; height:46px; flex:0 0 46px }
  .tot-card.tot-big .tc-lbl{ font-size:13px; font-weight:600; color:#3a3f52; text-transform:uppercase; letter-spacing:.04em }
  .tot-card.tot-big .tc-val{ font-size:28px; color:var(--primary) }
  .tot-sep{ width:1px; align-self:stretch; background:#d5dbf0; margin:8px 2px; flex:0 0 1px }
  .tot-hide{ position:absolute; top:8px; right:8px; z-index:2; display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--input); border-radius:9999px; padding:5px 12px; font-size:12px; font-weight:600; color:#444; cursor:pointer; opacity:0; pointer-events:none; transition:opacity .15s; box-shadow:0 2px 8px rgba(0,0,0,.08) }
  .kc-tots:hover .tot-hide{ opacity:1; pointer-events:auto }
  .tot-show{ height:28px; font-size:12px; border-radius:9999px; border:1px solid var(--primary); color:var(--primary); background:#fff; font-weight:600; padding:0 12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px }

  /* Toolbar */
  .toolbar{ display:flex; align-items:center; gap:12px; margin-bottom:12px }
  .search-box{ position:relative; flex:1 }
  .search-box .input{ padding-left:40px }
  .search-box .s-ico{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted) }
  .input{ width:100%; height:40px; border:1px solid #e2e8f0; border-radius:8px; padding:0 12px; font-size:14px; font-family:inherit; outline:none }
  .input:focus{ border-color:var(--primary) }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; height:38px; padding:0 16px; border-radius:9999px; font-size:14px; font-weight:600; border:1px solid transparent; white-space:nowrap; cursor:pointer; font-family:inherit }
  .btn-outline{ background:#fff; color:var(--primary); border-color:var(--primary) }
  .btn-outline:hover{ background:rgba(0,19,145,.05) }
  .btn-outline.on{ background:rgba(0,19,145,.08) }
  .kebab{ background:transparent; border:0; color:#444; padding:6px; border-radius:6px; cursor:pointer } .kebab:hover{ background:#eef0f4 }
  /* view toggle */
  .viewtog{ display:inline-flex; gap:6px }
  .vt{ width:38px; height:38px; border-radius:9px; border:1px solid var(--input); background:#fff; color:var(--muted-2); cursor:pointer; display:inline-flex; align-items:center; justify-content:center }
  .vt:hover{ background:#f4f6ff }
  .vt.on{ border-color:var(--primary); color:var(--primary); background:var(--blue-tint) }

  /* Tabs */
  .tabs{ display:flex; gap:24px; border-bottom:1px solid var(--input); margin-bottom:8px }
  .tab{ background:none; border:0; padding:10px 0; font-size:14px; color:var(--muted-2); cursor:pointer; position:relative; font-family:inherit }
  .tab.on{ color:var(--primary); font-weight:600 }
  .tab.on::after{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--primary); border-radius:2px }

  /* Table */
  .tbl-wrap{ overflow-x:auto; margin:0 -24px }
  table.tbl{ width:100%; border-collapse:collapse }
  table.tbl thead th{ background:var(--table-head); text-transform:uppercase; font-size:12px; letter-spacing:.03em; color:#555; font-weight:600; text-align:left; padding:13px 16px }
  table.tbl tbody td{ padding:16px; font-size:14px; border-bottom:1px solid var(--input); color:var(--text); vertical-align:middle }
  table.tbl tbody tr:nth-child(even){ background:var(--zebra) }
  table.tbl tbody tr:hover{ background:#fafafe }
  .row-link{ color:var(--primary); font-weight:600; cursor:pointer }
  .avatar{ width:22px; height:22px; border-radius:9999px; background:#e6e6ea; color:#444; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; flex:0 0 22px }
  .pill{ display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; padding:3px 12px; border-radius:9999px; border:1px solid; white-space:nowrap }
  .act-btn{ background:transparent; border:0; color:var(--primary); padding:6px; border-radius:6px; cursor:pointer } .act-btn:hover{ background:#eef0f4 }
  .act-btn:disabled{ color:#c4c8d4; cursor:not-allowed } .act-btn:disabled:hover{ background:transparent }
  .fav{ background:none; border:0; cursor:pointer; color:#c4c8d4; padding:2px; display:inline-flex } .fav.on{ color:var(--gold) } .fav:hover{ color:var(--gold) }
  .lock{ color:var(--muted); display:inline-flex; vertical-align:middle }
  .cnt{ display:inline-flex; align-items:center; gap:14px; color:var(--text) }
  .cnt span{ display:inline-flex; align-items:center; gap:4px }

  /* Cards */
  .cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(232px,1fr)); gap:16px }
  .card{ border:1px solid var(--input); border-radius:14px; overflow:hidden; background:#fff; display:flex; flex-direction:column; transition:box-shadow .12s } .card:hover{ box-shadow:0 8px 24px rgba(16,24,40,.10) }
  .card-prev{ position:relative; height:120px; background:#eef1fb; overflow:hidden }
  .card-prev svg{ width:100%; height:100% }
  .card-fav{ position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:8px; background:rgba(255,255,255,.9); border:0; cursor:pointer; color:#c4c8d4; display:inline-flex; align-items:center; justify-content:center } .card-fav.on{ color:var(--gold) }
  .card-body{ padding:11px 12px; display:flex; flex-direction:column; gap:6px }
  .card-idrow{ display:flex; align-items:center; gap:6px }
  .card-id{ color:var(--primary); font-weight:700; font-size:13px }
  .card-body .pill{ margin-left:auto }
  .card-type{ font-size:12px; font-weight:700; color:var(--muted-2); text-transform:uppercase; letter-spacing:.02em }
  .card-name{ font-size:13.5px; font-weight:600; color:var(--text-strong); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:35px }
  .card-owner{ display:inline-flex; align-items:center; gap:8px; font-size:12.5px; color:var(--text) }
  .card-foot{ display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border); padding-top:8px; margin-top:2px }

  /* Pagination / empty / placeholder */
  .pagination{ display:flex; align-items:center; gap:10px; justify-content:flex-end; padding:14px 0; font-size:13px; color:#666 }
  .pg-btn{ border:1px solid var(--input); background:#fff; border-radius:8px; padding:5px 8px; cursor:pointer } .pg-btn:disabled{ opacity:.4 }
  .empty{ border:1px solid var(--input); border-radius:12px; padding:48px 20px; text-align:center; margin-top:8px }
  .empty h3{ margin:0 0 6px; color:var(--text-strong) } .empty p{ margin:0 0 16px; color:var(--muted-2) }
  .btn-primary{ background:var(--primary); color:#fff; border-radius:8px } .btn-primary:hover{ background:var(--primary-hover) }

  /* Room settings modal */
  .rs-modal{ position:fixed; inset:0; background:rgba(10,12,25,.45); display:none; z-index:200 }
  .rs-modal.open{ display:flex; justify-content:flex-end }
  .rs{ width:460px; max-width:100%; height:100vh; background:#fff; box-shadow:-12px 0 40px rgba(0,0,0,.22); display:flex; flex-direction:column }
  .rs-head{ display:flex; align-items:flex-start; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border) }
  .rs-title{ font-size:16px; font-weight:600; color:var(--text-strong); display:flex; align-items:center; gap:8px }
  .rs-sub{ font-size:12px; color:var(--muted-2); margin-top:2px }
  .rs-x{ border:0; background:none; cursor:pointer; color:var(--muted); width:30px; height:30px; border-radius:8px } .rs-x:hover{ background:#f2f3f7 }
  .rs-body{ padding:18px 20px; display:flex; flex-direction:column; gap:14px; flex:1; overflow:auto }
  .rs-lbl{ font-size:12px; color:var(--muted-2); display:block; margin-bottom:5px }
  .rs-in{ width:100%; height:38px; border:1px solid var(--input); border-radius:8px; padding:0 10px; font-size:14px; font-family:inherit; outline:none } .rs-in:focus{ border-color:var(--primary) }
  textarea.rs-in{ height:auto; padding:8px 10px; resize:vertical }
  .rs-2{ display:flex; gap:14px } .rs-2>div{ flex:1 }
  .rs-tr{ display:flex; align-items:center; gap:10px; font-size:14px; color:var(--text-strong) }
  .rs-badge{ font-size:11px; font-weight:700; border-radius:99px; padding:1px 8px }
  .sw{ width:40px; height:22px; border-radius:99px; background:#d5d8e0; position:relative; cursor:pointer; flex:0 0 auto } .sw.on{ background:var(--primary) }
  .sw::after{ content:""; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:left .12s } .sw.on::after{ left:20px }
  .rs-foot{ display:flex; justify-content:flex-end; gap:10px; padding:14px 20px; border-top:1px solid var(--border) }

  /* ===== App shell — /solvace-sidebar + /solvace-top-bar (verbatim) ===== */
  :root{ --color-primary:#001391; --color-sidebar:#001391; --color-sidebar-active:#000b54; --color-input:oklch(0.922 0 0); --sidebar-w:248px }
  #shell{ display:flex; height:100vh; overflow:hidden }
  .main-col{ flex:1; display:flex; flex-direction:column; min-width:0 }
  .main-scroll{ flex:1; overflow:auto }
  /* ---- sidebar ---- */
  #sidebar{ width:var(--sidebar-w); flex:0 0 var(--sidebar-w); background:var(--color-sidebar); color:#fff; display:flex; flex-direction:column; transition:width .2s ease }
  #sidebar .side-scroll{ flex:1; overflow-y:auto }
  .side-user{ display:flex; align-items:center; gap:12px; padding:18px 16px }
  .side-avatar{ width:40px;height:40px;border-radius:9999px;background:#e6e6ea;color:#444;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex:0 0 40px }
  .side-acc-trigger{ display:flex;align-items:center;gap:12px;width:100%;padding:12px 16px;color:#fff;background:transparent;border:0;font-size:14px;font-weight:600;text-align:left }
  .side-acc-trigger:hover{ background:rgba(0,0,0,.18) }
  .side-acc-trigger[aria-expanded="true"]{ background:var(--color-sidebar-active) }
  .side-acc-trigger .chev{ margin-left:auto; transition:transform .2s }
  .side-acc-trigger[aria-expanded="true"] .chev{ transform:rotate(180deg) }
  .side-acc-content{ display:flex; flex-direction:column }
  .side-acc-content.collapsed{ display:none }
  .side-sublink{ padding:10px 16px 10px 52px; color:#dfe3ff; font-size:14px }
  .side-sublink:hover{ background:rgba(0,0,0,.18) }
  .side-sublink.active{ color:#fff; font-weight:600; text-decoration:underline; text-underline-offset:3px }
  .side-foot{ padding:16px; border-top:1px solid rgba(255,255,255,.16) }
  .side-foot a{ color:#fff }
  #sidebar .label, #sidebar .side-user-info, #sidebar .side-foot .lbl{ white-space:nowrap; overflow:hidden }
  #sidebar[data-collapsed="true"]{ width:64px; flex-basis:64px }
  #sidebar[data-collapsed="true"] .side-user-info,
  #sidebar[data-collapsed="true"] .label,
  #sidebar[data-collapsed="true"] .side-acc-content,
  #sidebar[data-collapsed="true"] .side-foot .lbl,
  #sidebar[data-collapsed="true"] .chev{ display:none }
  #sidebar[data-collapsed="true"] .side-acc-trigger{ justify-content:center; padding:12px 0 }
  #sidebar[data-collapsed="true"] .side-user{ justify-content:center; padding:18px 0 }
  /* ---- topbar ---- */
  .topbar{ height:64px; flex:0 0 64px; display:flex; align-items:center; padding:0 24px; background:#fff; border-bottom:1px solid var(--color-input) }
  .topbar-logo{ display:flex; align-items:center; gap:8px; font-size:22px; font-weight:600; color:#0a0a0a }
  .topbar-right{ margin-left:auto; display:flex; align-items:center; gap:18px; color:var(--color-primary) }
  .top-avatar{ width:36px;height:36px;border-radius:9999px;background:#2b2f42;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex:0 0 auto }
  .topbar-search{ flex:0 1 620px; display:flex; align-items:center; gap:8px; height:40px; padding:0 14px; margin-left:24px; background:#fff; border:1px solid var(--color-input); border-radius:10px; color:#999ba7 }
  .topbar-search input{ flex:1; min-width:0; border:0; outline:0; background:transparent; font-size:15px; color:#0d122f; font-family:inherit }
  .topbar-search input::placeholder{ color:#999ba7 }
  .topbar-search svg{ flex:0 0 auto; color:#999ba7 }
  .top-loc{ display:flex; align-items:center; gap:6px; height:40px; padding:0 12px; border:1px solid var(--color-input); border-radius:10px; background:#fff; color:#0d122f; font-size:14px; font-weight:500; cursor:pointer }
  .top-loc:hover{ background:#f6f7f9 }
  .top-loc .loc-chev{ color:#6b7280 }
  .top-icon{ position:relative; width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:10px; background:transparent; border:0; color:#0d122f; cursor:pointer }
  .top-icon:hover{ background:#f4f4f6 }
  .top-badge{ position:absolute; top:2px; right:3px; min-width:16px; height:16px; padding:0 4px; border-radius:9999px; background:#E22A2E; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; line-height:1; border:2px solid #fff }
  .top-kc{ border:1px solid var(--color-input) }
  .top-kc:hover{ background:#f4f4f6; border-color:var(--color-primary); color:var(--color-primary) }
  .hamburger{ display:none; background:transparent;border:0;color:var(--color-primary);margin-right:8px }
  /* ---- mobile backdrop + drawer (<1024) ---- */
  #sidebar-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:40 }
  @media (max-width:1023px){
    #sidebar{ position:fixed; left:0; top:0; height:100vh; z-index:50; transform:translateX(-100%); transition:transform .25s }
    #sidebar.mobile-open{ transform:translateX(0) }
    #sidebar[data-collapsed="true"]{ width:var(--sidebar-w); flex-basis:var(--sidebar-w) }
    #sidebar-backdrop.open{ display:block }
    .hamburger{ display:inline-flex }
  }

  /* ===== Solvace floating bar (/solvace-floating-bar) ===== */
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes slideUp { from { transform:translateY(8px); opacity:0 } to { transform:translateY(0); opacity:1 } }
  @keyframes menuPop{ from{ opacity:0; transform:translateY(18px) scale(.9) } to{ opacity:1; transform:translateY(0) scale(1) } }
  @keyframes kaiBreath{ 0%{transform:scale(1)} 50%{transform:scale(.93)} 100%{transform:scale(1)} }
  .fb-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:none; animation:fadeIn .15s } .fb-overlay.open{ display:block }
  .icon-dd{ position:fixed; z-index:95; width:240px; background:#fff; border:1px solid var(--input); border-radius:10px; box-shadow:0 12px 30px rgba(0,0,0,.16); display:none; overflow:hidden } .icon-dd.open{ display:block; animation:slideUp .12s }
  .icon-dd .idd-list{ max-height:300px; overflow:auto } .icon-dd .idd-item{ display:flex; align-items:center; gap:10px; padding:10px 14px; font-size:14px; cursor:pointer; color:#33373f } .icon-dd .idd-item:hover{ background:#f2f2f4 }
  .drawer{ position:fixed; top:0; right:0; height:100vh; width:380px; max-width:92vw; background:#fff; z-index:96; transform:translateX(100%); transition:transform .26s ease; display:flex; flex-direction:column; box-shadow:-6px 0 24px rgba(0,0,0,.18) } .drawer.open{ transform:translateX(0) }
  .drawer.drawer-left{ left:0; right:auto; transform:translateX(-100%); box-shadow:6px 0 24px rgba(0,0,0,.18) } .drawer.drawer-left.open{ transform:translateX(0) }
  .drawer-head{ display:flex;align-items:center;justify-content:space-between;padding:18px 20px;font-size:17px;font-weight:700;border-bottom:1px solid var(--input) }
  .drawer-body{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px } .drawer-foot{ flex:0 0 auto; padding:16px 20px; border-top:1px solid var(--input); display:flex; gap:10px }
  .fb-fab{ position:fixed; right:28px; bottom:24px; height:48px; padding:0 18px 0 12px; border-radius:12px; background:var(--primary); border:0; color:#fff; display:flex; align-items:center; gap:9px; font-size:16px; font-weight:600; cursor:pointer; box-shadow:0 4px 8px rgba(0,0,0,.2); z-index:60; font-family:inherit } .fb-fab:hover{ background:#001072 }
  .fb-fab .fab-plus{ display:flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; border:2px solid #fff; flex:0 0 auto }
  .glass-dock{ position:fixed; left:calc(50% + var(--sidebar-w)/2); bottom:24px; transform:translateX(-50%); z-index:55 } body.sb-collapsed .glass-dock{ left:calc(50% + 32px) } @media (max-width:1023px){ .glass-dock{ left:50%; bottom:16px } }
  .gd-bar{ position:relative; display:flex; align-items:center; gap:6px; height:56px; padding:0 8px; border-radius:12px; line-height:1; background:rgba(158,172,255,.32); border:1px solid rgba(255,255,255,.45); -webkit-backdrop-filter:blur(20px) saturate(1.8); backdrop-filter:blur(20px) saturate(1.8); box-shadow:0 4px 8px rgba(0,0,0,.22) }
  .gd-circles{ display:flex; align-items:center; gap:8px; margin:0 16px }
  .gd-circle{ position:relative; width:64px; height:64px; border-radius:50%; border:0; display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 64px; padding:0; z-index:2; background:var(--primary); color:#fff; box-shadow:0 6px 14px rgba(0,19,145,.35) } .gd-circle:hover{ background:#001072 }
  .gd-circle::after{ content:attr(data-label); position:absolute; top:calc(100% - 2px); left:50%; transform:translateX(-50%) translateY(-2px); background:#fff; color:#001391; font-size:11px; font-weight:700; line-height:1; padding:5px 10px; border-radius:8px; box-shadow:0 3px 10px rgba(0,5,36,.18); border:1px solid #E0E0FF; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .15s ease, transform .15s ease } .gd-circle:hover::after{ opacity:1; transform:translateX(-50%) translateY(0) }
  .gd-btn{ position:relative; width:56px; height:48px; border:0; background:transparent; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:#001391; cursor:pointer; padding:0 } .gd-btn:hover{ background:rgba(255,255,255,.4) }
  .gd-btn .gd-lbl{ font-size:10px; font-weight:600; line-height:1 }
  .gd-btn .gd-badge{ position:absolute; top:2px; right:7px; min-width:15px; height:15px; border-radius:9999px; background:#E22A2E; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 3px }
  .gd-btn.gd-util{ width:30px } .gd-btn.gd-handle{ cursor:grab; touch-action:none }
  .gd-nub{ display:none; align-items:center; justify-content:center; width:26px; height:26px; border-radius:9999px; color:var(--primary); background:#fff; border:1px solid #E0E0FF; box-shadow:0 3px 10px rgba(0,5,36,.28); cursor:pointer; padding:0 } .gd-nub svg{ width:15px; height:15px }
  .glass-dock.collapsed .gd-bar{ background:transparent; border:0; box-shadow:none; -webkit-backdrop-filter:none; backdrop-filter:none; padding:0; height:auto }
  .glass-dock.collapsed .gd-bar > *:not(.gd-circles){ display:none !important } .glass-dock.collapsed .gd-circles{ margin:0 } .glass-dock.collapsed .gd-circle-menu{ display:none }
  .glass-dock.collapsed .gd-nub{ display:flex; position:absolute; top:-9px; right:-9px; z-index:3 }
  .gd-kai-ico{ display:inline-flex; line-height:0; transition:transform .2s } .gd-kai-ico.kai-animating{ animation:kaiBreath 1.6s ease-in-out }

  /* ===== New room wizard (right drawer, 3 steps) ===== */

  .wz-st.done .n{ background:#dcf5e6; border-color:#14ae5c; color:#14ae5c }

  .tpl-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px }

  .tpl-cap{ padding:9px 10px } .tpl-cap-nm{ display:block; font-size:13px; font-weight:600; color:var(--text-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis } .tpl-cap-topic{ display:block; font-size:11px; color:var(--muted); margin-top:1px }

let totFilter=null, query='', totsHidden=false, view='list', tab='all', favOnly=false;
const el = id => document.getElementById(id);
const ini = n => n.trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase();

function totCard(c){
  const active = totFilter===c.key && (c.key!==null);
  return `<div class="tot-card tot-click${active?' tot-active':''}${c.key===null?' tot-big':''}" onclick="setTotFilter(${c.key?`'${c.key}'`:'null'})" title="Filter by ${c.label}">
    <span class="tc-ico" style="color:${c.solid};background:${c.tint};border-color:${c.solid}">${c.icon}</span>
    <span style="display:flex;flex-direction:column;line-height:1.3"><span class="tc-lbl">${c.label}</span><span class="tc-val">${c.value}</span></span></div>`;
}
function renderTots(){
  var right=el('crumbRight');
  if(totsHidden){
    el('tots').innerHTML='';
    if(right) right.innerHTML=`<button class="tot-show" onclick="totsHidden=false;renderTots()">${I.eye} Show totals</button>`;
  } else {
    if(right) right.innerHTML='';
    el('tots').innerHTML=`<div class="kc-tots">${MODULE.totals.map((c,i)=>totCard(c)+(i===0?'<span class="tot-sep"></span>':'')).join('')}<button class="tot-hide" onclick="totsHidden=true;renderTots()">${I.eyeOff} Hide</button></div>`;
  }
}
function setTotFilter(key){ totFilter = (totFilter===key) ? null : key; renderTots(); renderView(); }

function renderToolbar(){
  el('toolbar').innerHTML = `
    <div class="search-box"><input class="input" placeholder="Search" value="${query.replace(/"/g,'&quot;')}" oninput="query=this.value;renderView()"><span class="s-ico">${I.search}</span></div>

      <button class="vt${view==='list'?' on':''}" title="List view" onclick="view='list';renderToolbar();renderView()">${I.rows}</button>

      <button class="vt${view==='calendar'?' on':''}" title="Calendar view" onclick="view='calendar';renderToolbar();renderView()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg></button>

    <button class="kebab" title="More options">${I.kebab}</button>`;
}
function renderTabs(){
  el('tabs').innerHTML = `

}
function pill(st){ const s=MODULE.statuses[st]; return `<span class="pill" style="color:${s.solid};background:${s.tint};border-color:${s.solid}">${st}</span>`; }
function favBtn(r,cls){ return `<button class="${cls}${r.fav?' on':''}" title="${r.fav?'Remove favorite':'Add favorite'}" onclick="event.stopPropagation();toggleFav('${r.id}')">${r.fav?I.starFill:I.star}</button>`; }
function toggleFav(id){ const r=ROWS.find(x=>x.id===id); if(r){ r.fav=!r.fav; renderView(); } }
function editBtn(r){ return r.mine
  ? `<button class="act-btn" title="Room settings" onclick="openRoomSettings('${r.id}')">${I.pencil}</button>`
  : `<button class="act-btn" disabled title="Only the room owner can edit">${I.pencil}</button>`; }

function filtered(){
  const q=query.trim().toLowerCase();
  return ROWS
    .filter(r => tab==='all' || r.mine)
    .filter(r => !favOnly || r.fav)
    .filter(r => !totFilter || r.st===totFilter)
    .filter(r => !q || (r.id+' '+r.title+' '+r.source+' '+r.resp).toLowerCase().includes(q));
}
function emptyState(){
  return `<div class="empty"><h3>No ${MODULE.entity}s found</h3><p>Try other terms or clear the applied filters.</p>
    <button class="btn btn-primary" onclick="query='';totFilter=null;favOnly=false;tab='all';renderTots();renderToolbar();renderTabs();renderView()">Clear filters</button></div>`;
}
function pager(n){ return `<div class="pagination"><span>Items per page:</span><select class="input" style="width:auto;height:30px;padding:0 6px"><option>12</option><option>24</option></select>

    <button class="pg-btn" disabled>${I.chevL}</button><button class="pg-btn">${I.chevR}</button></div>`; }

function renderView(){
  const rows=filtered();
  if(view==='calendar'){ renderCalendar(rows); return; }
  if(!rows.length){ el('view').innerHTML=emptyState(); return; }
  view==='kanban' ? renderKanban(rows) : renderTable(rows);
}

function renderTable(rows){
  el('view').innerHTML = `<div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th style="width:52px"></th><th>N°</th><th>Action plan</th><th>System</th><th>Source</th><th>Responsible</th><th>Age</th><th>Status</th>

      <tr>
        <td>${favBtn(r,'fav')}</td>
        <td><span class="row-link" title="Open action plan">${r.id}</span></td>
        <td style="max-width:360px">${r.title}</td>
        <td>Obeya Digital</td>
        <td><span class="row-link" title="Open board in a new tab" onclick="openBoard('${r.source}')">${r.source}</span></td>
        <td><span style="display:inline-flex;align-items:center;gap:8px"><span class="avatar">${ini(r.resp)}</span>${r.resp}</span></td>
        <td style="white-space:nowrap">${r.age} days</td>
        <td>${pill(r.st)}</td>
      </tr>`).join('')}</tbody></table></div>${pager(rows.length)}`;
}
var kbDragId=null;
function kbDrag(e,id){ kbDragId=id; e.dataTransfer.effectAllowed='move'; try{ e.dataTransfer.setData('text/plain',id); }catch(_){} var c=e.target.closest('.kb-card'); if(c) c.classList.add('kb-dragging'); }
function kbDrop(e,st){ e.preventDefault(); e.currentTarget.classList.remove('kb-over'); if(!kbDragId) return; var r=ROWS.find(function(x){return x.id===kbDragId;}); if(r) r.st=st; kbDragId=null; renderKanban(filtered()); renderTots(); }

var calY=2026, calM=1;
function calNav(delta){ calM+=delta; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} renderCalendar(filtered()); }
function renderCalendar(rows){
  var MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var lead=new Date(calY,calM,1).getDay(), dim=new Date(calY,calM+1,0).getDate();
  var showAp=(calY===2026&&calM===1);
  var cells='';
  for(var i=0;i<lead;i++) cells+='<div class="cal-cell mut"></div>';
  for(var day=1;day<=dim;day++){
    var aps=showAp?rows.filter(function(r){return r.d===day;}):[];
    var chips=aps.map(function(r){ var c=MODULE.statuses[r.st]; return '<div class="cal-ap" style="background:'+c.tint+';color:'+c.solid+';border-color:'+c.solid+'" title="'+r.id+' · '+r.title.replace(/"/g,'&quot;')+'"><span class="cal-ap-dot" style="background:'+c.solid+'"></span>'+r.id+'</div>'; }).join('');
    cells+='<div class="cal-cell"><div class="cal-dn">'+day+'</div>'+chips+'</div>';
  }
  el('view').innerHTML='<div class="cal-wrap"><div class="cal-top"><button class="cal-nav" onclick="calNav(-1)">'+I.chevL+'</button><b>'+MO[calM]+' '+calY+'</b><button class="cal-nav" onclick="calNav(1)">'+I.chevR+'</button></div><div class="cal-grid">'+DOW.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('')+cells+'</div></div>';
}

function renderMenuModal(keepFocus){ var gs=menuGroups(); if(gs.indexOf(menuTab)<0) menuTab=gs[0]; el('menu-tabs').innerHTML=gs.map(function(g){ return '<span class="menu-tab'+(menuTab===g&&!menuQ.trim()?' on':'')+'" data-g="'+g.replace(/"/g,'&quot;')+'" onclick="pickMenuTab(this.getAttribute(\'data-g\'))">'+g+'</span>'; }).join(''); (window.requestAnimationFrame||setTimeout)(layoutMenuTabs); var q=menuQ.trim().toLowerCase(); var ctx=q||menuTab==='Favorites'; var list=q?MODULES.filter(function(m){ return m.n.toLowerCase().indexOf(q)>=0; }):(menuTab==='Favorites'?MODULES.filter(function(m){ return kcFavMods.indexOf(m.k)>=0; }):MODULES.filter(function(m){ return m.g===menuTab; })); el('menu-grid').innerHTML=list.map(function(m){ var sub=ctx?'<span style="display:block;font-size:11px;color:#9aa0ac;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+m.g+'</span>':''; return '<div class="menu-mod" title="'+m.g+'" onclick="closeMenuModal();fbToast(\'Opening '+m.n.replace(/'/g,'')+'…\')"><span class="mm-ico">'+MOD_LINK_ICO+'</span><span class="mm-name">'+m.n+sub+'</span><button class="mm-star" title="Favorite" onclick="event.stopPropagation();toggleFavMod(\''+m.k.replace(/'/g,'')+'\')">'+modStar(m.k)+'</button></div>'; }).join('')||'<div style="grid-column:1/-1;color:#9aa0ac;font-size:14px;padding:12px 0;text-align:center">No modules found</div>'; if(keepFocus){ var si=el('menu-search'); if(si) si.focus(); } }
function toggleFavMod(k){ var i=kcFavMods.indexOf(k); if(i>=0) kcFavMods.splice(i,1); else kcFavMods.push(k); try{ localStorage.setItem('obeya_fav_mods', JSON.stringify(kcFavMods)); }catch(e){} if(!kcFavMods.length&&menuTab==='Favorites') menuTab=''; renderMenuModal(true); }
var kaiAnimRunning=false;
function kaiHoverAnim(){ if(kaiAnimRunning) return; var paths=[].slice.call(document.querySelectorAll('#gd-kai-slot path')); if(!paths.length) return; kaiAnimRunning=true; var slot=el('gd-kai-slot'); if(slot) slot.classList.add('kai-animating'); var D=1600; var meta=paths.map(function(p,i){ return {p:p, off:(i/paths.length)*0.55+Math.random()*0.3}; }); paths.forEach(function(p){ p.style.transition='opacity .22s ease'; }); var t0=(window.performance&&performance.now)?performance.now():Date.now(); function frame(now){ var t=((now||Date.now())-t0)/D; if(t>=1){ meta.forEach(function(m){ m.p.style.opacity='1'; }); if(slot) slot.classList.remove('kai-animating'); kaiAnimRunning=false; return; } var ph=t<0.5?t*2:(1-t)*2; meta.forEach(function(m){ m.p.style.opacity=(ph>m.off)?'0':'1'; }); (window.requestAnimationFrame||function(f){setTimeout(function(){f(Date.now());},16);})(frame); } (window.requestAnimationFrame||function(f){setTimeout(function(){f(Date.now());},16);})(frame); }
function toggleDock(){ var d=el('bottombar'); if(!d) return; var willCollapse=!d.classList.contains('collapsed'); d.classList.toggle('collapsed'); if(willCollapse){ d.style.left=''; d.style.top=''; d.style.bottom=''; d.style.transform=''; } }
var _dock={drag:false,ox:0,oy:0};
function dockDragStart(e){ var d=el('bottombar'); if(!d) return; e.preventDefault(); var r=d.getBoundingClientRect(); _dock.drag=true; _dock.ox=e.clientX-r.left; _dock.oy=e.clientY-r.top; d.style.left=r.left+'px'; d.style.top=r.top+'px'; d.style.bottom='auto'; d.style.transform='none'; document.addEventListener('pointermove',dockDragMove); document.addEventListener('pointerup',dockDragEnd); }
function dockDragMove(e){ if(!_dock.drag) return; var d=el('bottombar'); var w=d.offsetWidth,h=d.offsetHeight; var x=Math.max(6,Math.min(window.innerWidth-w-6,e.clientX-_dock.ox)); var y=Math.max(6,Math.min(window.innerHeight-h-6,e.clientY-_dock.oy)); d.style.left=x+'px'; d.style.top=y+'px'; }
function dockDragEnd(){ _dock.drag=false; document.removeEventListener('pointermove',dockDragMove); document.removeEventListener('pointerup',dockDragEnd); }
function fbMaybeOverlay(){ var ids=['app-drawer','kai-drawer','menu-modal']; var any=ids.some(function(id){ return el(id).classList.contains('open'); }); if(!any) el('overlay').classList.remove('open'); }
function fbCloseAll(){ if(el('menu-modal').classList.contains('open')){ closeMenuModal(); return; } if(el('kai-drawer').classList.contains('open')){ closeKaiPanel(); return; } if(el('app-drawer').classList.contains('open')){ closeAppDrawer(); return; } }
document.addEventListener('keydown', function(e){ if(e.key==='Escape') fbCloseAll(); });
document.addEventListener('click', function(ev){ var path=ev.composedPath?ev.composedPath():[]; var inPath=function(sel){ return path.some(function(n){ return n&&n.nodeType===1&&n.matches&&n.matches(sel); }); }; if(!inPath('#sel-dd')&&!inPath('[data-sel]')) el('sel-dd').classList.remove('open'); });
(function(){ var kaiSlot=el('gd-kai-slot'); if(kaiSlot){ var kd=FB_KAI.match(/ d="([^"]+)"/); var kSubs=kd?kd[1].split(/(?=M)/):[]; kaiSlot.innerHTML='<svg width="42" height="41" viewBox="0 0 31 30" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">'+kSubs.map(function(s){ return '<path d="'+s+'"/>'; }).join('')+'</svg>'; } if(typeof fbUpdateFab==='function') fbUpdateFab(); })();
</script>
