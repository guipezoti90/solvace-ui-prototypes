<!--
  ============================================================
  CAMADA DE COMENTÁRIOS (estilo Figma) — DROP-IN PORTÁTIL  · v2
  ------------------------------------------------------------
  Cole TODO este bloco imediatamente antes de </body> em qualquer HTML.
  Sem dependências, sem build, sem CDN. Funciona em file:// ou hospedado.

  Opcional (recomendado quando há vários módulos): defina chave e título
  ANTES do bloco para não misturar comentários entre projetos:
    <script>window.RV_CONFIG={key:'meu_modulo_v1', title:'Revisão — Meu Módulo'}</script>

  NOVIDADES v2:
  • Visão por contexto: comentários ficam atrelados à "visão" onde foram
    criados — o documento/board OU um modal/dialog aberto. Ao abrir um modal,
    os comentários daquele modal aparecem; ao trocar de contexto, carrega só
    os daquela visão SEM apagar os demais (todos continuam salvos/exportados).
    Detecção de modal por [role="dialog"], [aria-modal="true"], .modal ou
    [data-rv-view]. Personalize com RV_CONFIG.modalSelector.
  • Refresh estável: a medição ignora a própria camada (sem realimentar o
    scrollHeight), então os pinos não "trocam de lugar" ao recarregar.
    Para forçar o container do board, use data-rv-scroll no elemento que rola.
  • Clique no pino OU no item da lista abre/edita o comentário.
  • Observer pausado durante o render (sem loop) e atento a abrir/fechar modal.
  ============================================================
-->
<button id="rv-toggle">💬 Revisão</button>
<div id="rv-bar">
  <div class="rv-top"><span class="dot"></span> <span id="rv-title">Revisão de comentários</span> <span style="margin-left:auto;cursor:pointer" id="rv-min">—</span></div>
  <div class="rv-sec">
    <div><label>Seu nome (revisor)</label><input type="text" id="rv-name" placeholder="ex.: Maria"></div>
    <button id="rv-mode">💬 Ativar modo comentário</button>
    <div class="row">
      <button id="rv-listbtn">📋 Lista (<span id="rv-count">0</span>)</button>
      <button id="rv-export">⬇ Exportar</button>
    </div>
    <div class="row"><button id="rv-importbtn" style="flex:1">⬆ Importar comentários</button></div>
    <input type="file" id="rv-import" accept=".html,.json" style="display:none">
    <div class="hint">Ative o modo, <b>clique no ponto</b> que quer comentar e escreva. Ao terminar, <b>Exportar</b> gera um arquivo com os comentários salvos para enviar de volta.</div>
  </div>
</div>
<div id="rv-layer"></div>
<div id="rv-pop"></div>
<div id="rv-panel"><h3>Comentários <button id="rv-close">×</button></h3><div id="rv-list"></div></div>
<script type="application/json" id="rv-data">{"savedAt":0,"comments":[]}</script>

<style>
  #rv-bar{position:fixed;top:14px;right:14px;z-index:9000;background:#0f172a;color:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(2,6,23,.35);font-size:13px;width:270px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  #rv-bar .rv-top{display:flex;align-items:center;gap:8px;padding:11px 13px;font-weight:700}
  #rv-bar .rv-top .dot{width:10px;height:10px;border-radius:50%;background:#f43f5e}
  #rv-bar .rv-sec{padding:0 13px 13px;display:flex;flex-direction:column;gap:9px}
  #rv-bar label{font-size:11px;color:#94a3b8;display:block;margin-bottom:3px}
  #rv-bar input[type=text]{width:100%;padding:7px 9px;border-radius:7px;border:1px solid #334155;background:#1e293b;color:#fff;font-size:13px}
  #rv-bar button{border:0;border-radius:8px;padding:8px 10px;font-size:12.5px;font-weight:600;cursor:pointer;color:#fff;background:#334155}
  #rv-bar button.on{background:#f43f5e}
  #rv-bar .row{display:flex;gap:7px}#rv-bar .row button{flex:1}
  #rv-bar .hint{font-size:11px;color:#94a3b8;line-height:1.45}
  #rv-toggle{position:fixed;top:14px;right:14px;z-index:9001;background:#0f172a;color:#fff;border:0;border-radius:10px;padding:9px 12px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 6px 18px rgba(2,6,23,.3);display:none;font-family:inherit}
  .rv-pin{position:absolute;z-index:8000;width:26px;height:26px;border-radius:50% 50% 50% 2px;background:#f43f5e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transform:translate(-3px,-26px);box-shadow:0 3px 8px rgba(0,0,0,.3);border:2px solid #fff}
  .rv-pin.resolved{background:#16a34a;opacity:.85}
  #rv-layer{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:7000}
  #rv-layer .rv-pin{pointer-events:auto}
  body.rv-commenting{cursor:crosshair}
  #rv-pop{position:fixed;z-index:9500;width:260px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 12px 30px rgba(2,6,23,.25);padding:12px;display:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  #rv-pop textarea{width:100%;min-height:64px;border:1px solid #e2e8f0;border-radius:8px;padding:8px;font-size:13px;font-family:inherit;resize:vertical}
  #rv-pop .meta{font-size:11px;color:#64748b;margin-bottom:6px}
  #rv-pop .acts{display:flex;gap:7px;margin-top:8px}
  #rv-pop button{border:0;border-radius:7px;padding:7px 10px;font-size:12px;font-weight:600;cursor:pointer}
  #rv-pop .save{background:#0e7490;color:#fff;flex:1}#rv-pop .res{background:#dcfce7;color:#166534}#rv-pop .del{background:#fee2e2;color:#991b1b}
  #rv-panel{position:fixed;top:0;right:-360px;width:340px;height:100%;background:#fff;z-index:8900;box-shadow:-6px 0 24px rgba(2,6,23,.18);transition:right .25s;display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  #rv-panel.open{right:0}
  #rv-panel h3{margin:0;padding:16px 18px;border-bottom:1px solid #e2e8f0;font-size:15px;display:flex;justify-content:space-between;align-items:center}
  #rv-panel h3 button{border:0;background:none;font-size:18px;cursor:pointer;color:#64748b}
  #rv-list{overflow:auto;padding:10px 14px;flex:1}
  .rv-item{border:1px solid #e2e8f0;border-radius:10px;padding:10px;margin-bottom:9px;cursor:pointer}
  .rv-item:hover{background:#f8fafc}
  .rv-item .h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;margin-bottom:4px}
  .rv-item .h .b{background:#f43f5e;color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
  .rv-item.resolved .b{background:#16a34a}
  .rv-item .t{font-size:13px;white-space:pre-wrap}
  .rv-item .when{font-size:10.5px;color:#64748b;margin-top:5px}
  @media print{#rv-bar,#rv-toggle,#rv-panel,#rv-pop{display:none!important}.rv-pin{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>

<script>
(function(){
  var CFG=window.RV_CONFIG||{};
  var KEY=CFG.key||('rv_'+(document.title||location.pathname).replace(/[^a-z0-9]+/gi,'_').toLowerCase());
  if(CFG.title){document.getElementById('rv-title').textContent=CFG.title;}
  var MODAL_SEL=CFG.modalSelector||'[role="dialog"],[aria-modal="true"],.modal,[data-rv-view]';
  var layer=document.getElementById('rv-layer'),pop=document.getElementById('rv-pop'),panel=document.getElementById('rv-panel'),
      list=document.getElementById('rv-list'),countEl=document.getElementById('rv-count'),nameInput=document.getElementById('rv-name'),
      modeBtn=document.getElementById('rv-mode');
  var comments=[],commentMode=false,seq=0,RVMO=null;
  function parse(s){try{return JSON.parse(s)}catch(e){return null}}
  var embedded=parse(document.getElementById('rv-data').textContent)||{savedAt:0,comments:[]};
  var stored=parse(localStorage.getItem(KEY))||{savedAt:0,comments:[]};
  var src=(embedded.savedAt>=stored.savedAt)?embedded:stored;
  comments=src.comments||[]; seq=comments.reduce(function(m,c){return Math.max(m,c.n||0)},0);
  var sn=localStorage.getItem(KEY+'_name'); if(sn) nameInput.value=sn;

  // ---- visão atual: documento/board x modal/dialog aberto ----
  function vis(e){ if(!e||e.closest('#rv-bar,#rv-panel,#rv-pop')) return false; if(!e.getClientRects().length) return false; var cs=getComputedStyle(e); return cs.display!=='none'&&cs.visibility!=='hidden'&&parseFloat(cs.opacity||'1')>0; }
  function activeModal(){ var ns=document.querySelectorAll(MODAL_SEL),out=null; for(var i=0;i<ns.length;i++){ if(vis(ns[i])) out=ns[i]; } return out; }
  function viewKey(){ var m=activeModal(); return m ? ('modal:'+(m.id||m.getAttribute('data-rv-view')||'dialog')) : 'doc'; }
  function docScroller(){ var k=document.querySelector('[data-rv-scroll]'); if(k) return k; var mn=document.querySelector('main'); if(mn) return mn; return document.scrollingElement||document.documentElement; }
  function innerScroller(root){ var best=null,area=0,els=root.querySelectorAll('*'); for(var i=0;i<els.length;i++){var e=els[i];if(e.closest('#rv-bar,#rv-panel,#rv-pop'))continue;var cs=getComputedStyle(e),oy=cs.overflowY;if((oy==='auto'||oy==='scroll')&&e.scrollHeight>e.clientHeight+4&&e.getClientRects().length){var a=e.clientWidth*e.clientHeight;if(a>area){area=a;best=e;}}} return best||root; }
  function getAnchor(view){ if(view.indexOf('modal:')===0){ var m=activeModal(); return m?innerScroller(m):docScroller(); } return docScroller(); }
  function isDoc(a){ return a===document.scrollingElement||a===document.documentElement||a===document.body; }
  function scW(a){ return isDoc(a)?document.documentElement.scrollWidth:(a.scrollWidth||a.clientWidth||1); }
  function scH(a){ return isDoc(a)?document.documentElement.scrollHeight:(a.scrollHeight||a.clientHeight||1); }

  function save(){var p={savedAt:Date.now(),comments:comments};localStorage.setItem(KEY,JSON.stringify(p));localStorage.setItem(KEY+'_name',nameInput.value||'');document.getElementById('rv-data').textContent=JSON.stringify(p);}
  function esc(s){return (s||'').replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]})}

  function render(){
    if(RVMO){RVMO.disconnect();}                       // evita loop: render muta o DOM
    var view=viewKey(), anchor=getAnchor(view), docMode=isDoc(anchor), host=docMode?document.body:anchor;
    if(layer.parentNode!==host) host.appendChild(layer);
    if(!docMode && getComputedStyle(anchor).position==='static') anchor.style.position='relative';
    layer.style.height='0px';                          // mede sem a própria camada influenciar o scrollHeight
    var W=scW(anchor), H=scH(anchor);
    layer.style.width=docMode?(W+'px'):'100%'; layer.style.height=H+'px'; layer.innerHTML='';
    var shown=comments.filter(function(c){return (c.view||'doc')===view;});   // só a visão atual
    shown.forEach(function(c){var pin=document.createElement('div');pin.className='rv-pin'+(c.resolved?' resolved':'');pin.textContent=c.n;pin.dataset.n=c.n;
      pin.style.left=(c.xPct*W)+'px';pin.style.top=(c.yPct*H)+'px';pin.title=(c.author||'?')+': '+c.text;
      pin.addEventListener('click',function(ev){ev.stopPropagation();openPop(c,pin)});layer.appendChild(pin);});
    list.innerHTML=''; if(!shown.length){list.innerHTML='<p style="color:#94a3b8;font-size:13px;padding:6px">Nenhum comentário nesta visão.</p>';}
    shown.slice().sort(function(a,b){return a.n-b.n}).forEach(function(c){var it=document.createElement('div');it.className='rv-item'+(c.resolved?' resolved':'');
      it.innerHTML='<div class="h"><span class="b">'+c.n+'</span> '+esc(c.author||'—')+(c.resolved?' · ✓ resolvido':'')+'</div><div class="t">'+esc(c.text)+'</div><div class="when">'+new Date(c.ts).toLocaleString('pt-BR')+'</div>';
      it.addEventListener('click',function(){var a=getAnchor(viewKey());try{(a.scrollTo?a:window).scrollTo({top:c.yPct*scH(a)-160,behavior:'smooth'});}catch(e){} var pin=layer.querySelector('.rv-pin[data-n="'+c.n+'"]');openPop(c,pin);});list.appendChild(it);});
    countEl.textContent=shown.length;
    if(RVMO){ try{ RVMO.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class','style']}); }catch(e){} }
  }
  function openPop(c,el){var r=el?el.getBoundingClientRect():{left:innerWidth/2,top:innerHeight/2};pop.style.display='block';
    pop.style.left=Math.min(r.left+30,innerWidth-280)+'px';pop.style.top=Math.max(8,Math.min(r.top,innerHeight-180))+'px';
    pop.innerHTML='<div class="meta">Pino #'+c.n+(c.author?(' · '+esc(c.author)):'')+'</div><textarea id="rv-ta">'+esc(c.text)+'</textarea><div class="acts"><button class="save" id="rv-sv">Salvar</button><button class="res" id="rv-rs">'+(c.resolved?'Reabrir':'Resolver')+'</button><button class="del" id="rv-dl">Excluir</button></div>';
    var ta=document.getElementById('rv-ta');ta.focus();
    document.getElementById('rv-sv').onclick=function(){c.text=ta.value.trim();c.author=nameInput.value||c.author||'Anônimo';c.ts=Date.now();if(!c.text){rm(c)}else{save();render()}pop.style.display='none';};
    document.getElementById('rv-rs').onclick=function(){c.resolved=!c.resolved;save();render();pop.style.display='none';};
    document.getElementById('rv-dl').onclick=function(){rm(c);pop.style.display='none';};
  }
  function rm(c){comments=comments.filter(function(x){return x!==c});save();render();}
  document.addEventListener('click',function(ev){if(!commentMode)return;if(ev.target.closest('#rv-bar,#rv-toggle,#rv-panel,#rv-pop,.rv-pin'))return;
    var view=viewKey(), anchor=getAnchor(view), docMode=isDoc(anchor), rect=anchor.getBoundingClientRect?anchor.getBoundingClientRect():{left:0,top:0};
    var x,y;
    if(docMode){ x=ev.pageX; y=ev.pageY; }
    else { x=ev.clientX-(rect.left||0)+(anchor.scrollLeft||0); y=ev.clientY-(rect.top||0)+(anchor.scrollTop||0); }
    var c={n:++seq,view:view,xPct:x/(scW(anchor)||1),yPct:y/(scH(anchor)||1),author:nameInput.value||'Anônimo',text:'',ts:Date.now(),resolved:false};
    comments.push(c);save();render();var pins=layer.querySelectorAll('.rv-pin');openPop(c,pins[pins.length-1]);});
  modeBtn.onclick=function(){commentMode=!commentMode;document.body.classList.toggle('rv-commenting',commentMode);modeBtn.classList.toggle('on',commentMode);modeBtn.textContent=commentMode?'✋ Sair do modo comentário':'💬 Ativar modo comentário';};
  document.getElementById('rv-listbtn').onclick=function(){panel.classList.add('open')};
  document.getElementById('rv-close').onclick=function(){panel.classList.remove('open')};
  nameInput.onchange=save;
  document.getElementById('rv-min').onclick=function(){document.getElementById('rv-bar').style.display='none';document.getElementById('rv-toggle').style.display='block';};
  document.getElementById('rv-toggle').onclick=function(){document.getElementById('rv-bar').style.display='block';document.getElementById('rv-toggle').style.display='none';};
  document.getElementById('rv-export').onclick=function(){save();var clone=document.documentElement.cloneNode(true);
    var a=clone.querySelector('#rv-layer');if(a)a.innerHTML='';var b=clone.querySelector('#rv-list');if(b)b.innerHTML='';
    var c=clone.querySelector('#rv-pop');if(c){c.innerHTML='';c.style.display='none';}
    var name=(document.title||'arquivo').replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'-COMENTADO.html';
    dl(new Blob(['<!DOCTYPE html>\n'+clone.outerHTML],{type:'text/html'}),name);};
  document.getElementById('rv-importbtn').onclick=function(){document.getElementById('rv-import').click()};
  document.getElementById('rv-import').onchange=function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();
    rd.onload=function(){var data=null,t=rd.result;if(f.name.endsWith('.json')){data=parse(t)}else{var m=t.match(/<script[^>]*id="rv-data"[^>]*>([\s\S]*?)<\/script>/);if(m)data=parse(m[1]);}
      if(data&&data.comments){comments=data.comments;seq=comments.reduce(function(mx,c){return Math.max(mx,c.n||0)},0);save();render();alert('Importados '+comments.length+' comentário(s).');}else alert('Não encontrei comentários nesse arquivo.');};
    rd.readAsText(f);};
  function dl(blob,name){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(function(){URL.revokeObjectURL(a.href)},2000);}
  window.addEventListener('resize',render); window.addEventListener('load',render);
  // reposiciona/troca de visão quando o conteúdo muda ou um modal abre/fecha (classe/estilo)
  try{ RVMO=new MutationObserver(function(){clearTimeout(window.__rvmo);window.__rvmo=setTimeout(render,120);});
    RVMO.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class','style']}); }catch(e){}
  render();
})();
</script>
